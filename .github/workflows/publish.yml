name: publish

# Publishes when you create a GitHub Release (recommended: tag it v1.0.1 etc.):
#   1. build + publish to PyPI via Trusted Publishing (OIDC)
#   2. publish server.json to the official MCP Registry via GitHub OIDC
# No API tokens are stored in this repo — both steps use OIDC.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # configure this environment's trusted publisher on PyPI
    permissions:
      id-token: write          # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for MCP Registry GitHub OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4   # needs server.json
      - name: Wait for PyPI to expose the new description
        # The registry verifies ownership via the mcp-name token in the live
        # PyPI description; give the just-published release time to propagate.
        run: sleep 90
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
