name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so a rapid push/PR series doesn't
# stack up jobs (also trims minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with dev extras)
        run: python -m pip install -e ".[dev]"

      # `agy` is NOT installed on CI runners, so the live round-trip test
      # auto-skips (see tests/test_smoke.py). Unit tests for clean(),
      # find_agy(), and arg validation always run.
      - name: Run tests
        run: python -m pytest -q
